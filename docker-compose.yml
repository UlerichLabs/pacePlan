services:
  postgres:
    image: postgres:16-alpine
    container_name: paceplan-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paceplan
      POSTGRES_PASSWORD: password
      POSTGRES_DB: paceplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/src/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paceplan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
